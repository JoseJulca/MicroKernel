<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mundial</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d1b2a;
      color: #e0e6ed;
      padding: 16px;
    }

    h2 {
      text-align: center;
      color: #4fd1c5;
      margin-bottom: 14px;
      font-size: 20px;
      letter-spacing: 1px;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    button {
      grid-column: span 1;
      background: #1b2a3d;
      color: #e0e6ed;
      border: 1px solid #2e4258;
      border-radius: 8px;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #4fd1c5;
      color: #0d1b2a;
    }

    button.full {
      grid-column: span 2;
    }

    #output {
      min-height: 80px;
    }

    .card {
      background: #142435;
      border: 1px solid #2e4258;
      border-radius: 10px;
      padding: 12px 14px;
      animation: fadeIn 0.25s ease-in;
    }

    .card-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #4fd1c5;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    /* Tarjeta de resultado de partido */
    .match-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .team {
      font-weight: 600;
      font-size: 14px;
    }

    .score {
      font-size: 18px;
      font-weight: 700;
      color: #4fd1c5;
    }

    .vs {
      color: #6b7d92;
      font-size: 12px;
      margin: 0 6px;
    }

    /* Tarjeta de ranking */
    .ranking-list {
      list-style: none;
      counter-reset: rank;
    }

    .ranking-list li {
      counter-increment: rank;
      display: flex;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #1f3245;
      font-size: 13px;
    }

    .ranking-list li:last-child {
      border-bottom: none;
    }

    .ranking-list li::before {
      content: counter(rank);
      background: #4fd1c5;
      color: #0d1b2a;
      font-weight: 700;
      font-size: 11px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
    }

    /* Tarjeta de predicción */
    .prediction-main {
      text-align: center;
      padding: 6px 0;
    }

    .prediction-team {
      font-size: 20px;
      font-weight: 700;
      color: #ffd166;
    }

    .confidence-bar {
      background: #1f3245;
      border-radius: 6px;
      height: 8px;
      margin-top: 10px;
      overflow: hidden;
    }

    .confidence-fill {
      background: #4fd1c5;
      height: 100%;
    }

    .confidence-label {
      text-align: right;
      font-size: 11px;
      color: #6b7d92;
      margin-top: 4px;
    }

    .error {
      color: #ff6b6b;
      font-size: 13px;
      text-align: center;
    }

    .loading {
      text-align: center;
      color: #6b7d92;
      font-size: 13px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <h2>🏆 Mundial</h2>
  <div class="buttons">
    <button id="btnScore">Resultados</button>
    <button id="btnRanking">Ranking</button>
    <button id="btnPrediction" class="full">Predicción</button>
  </div>
  <div id="output">
    <div class="loading">Selecciona una opción</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
